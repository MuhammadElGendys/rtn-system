<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRN Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="img/logo.svg">
</head>

<body>
    <!-- HEADER with TRN Logo and Navigation (Full Width) -->
    <header class="header">
        <div class="header-content">
            <div class="logo-section">
                <img src="img/logo.svg" alt="TRN Logo" class="logo-img">
            </div>

            <!-- NAVIGATION TABS -->
            <nav class="nav-tabs">
                <button class="tab-btn active" data-tab="dashboard">Dashboard</button>
                <button class="tab-btn" data-tab="live-data">Live Data</button>
                <button class="tab-btn" data-tab="control">Control</button>
                <button class="tab-btn" data-tab="alarms">Alarms</button>
                <button class="tab-btn" data-tab="settings">Settings</button>
            </nav>
        </div>
    </header>

    <div class="container">
        <!-- DASHBOARD TAB (Main Content) -->
        <div class="tab-content active" id="dashboard">
            <!-- Simple Visualization Section -->
            <div class="visualization-section">
                <!-- Status Circle -->
                <div class="status-container">
                    <div class="status-circle" id="statusCircle"></div>
                    <p class="status-text" id="statusText">System Status</p>
                </div>

                <!-- Values Display -->
                <div class="values-container">
                    <div class="value-box">
                        <span class="value-label">Val1</span>
                        <span class="value-display" id="val1">--</span>
                    </div>
                    <div class="value-box">
                        <span class="value-label">Val2</span>
                        <span class="value-display" id="val2">--</span>
                    </div>
                    <div class="value-box">
                        <span class="value-label">Val3</span>
                        <span class="value-display" id="val3">--</span>
                    </div>
                    <div class="value-box">
                        <span class="value-label">Val4</span>
                        <span class="value-display" id="val4">--</span>
                    </div>
                </div>
            </div>
        </div>


        <!-- LIVE DATA TAB -->
        <div class="tab-content" id="live-data">
            <h2 style="margin: 20px 0px 40px;">Live Data Graphs</h2>
            <!-- ///////////////////////////////////////////////////////////////////////////////////// -->

            <div class="alarms-container">
                <p id="alarmStatus" class="alarm-placeholder">Coming soon in a newer version...</p>
            </div>
            <!-- <div class="charts-container">
                <div class="chart-wrapper">
                    <h3>Loading Temperature</h3>
                    <canvas id="tempChart1"></canvas>
                </div>
                <div class="chart-wrapper">
                    <h3>Loading Velocity</h3>
                    <canvas id="velocityChart1"></canvas>
                </div>
                <div class="chart-wrapper">
                    <h3>Unloading Temperature</h3>
                    <canvas id="tempChart2"></canvas>
                </div>
            </div> -->
        </div>

        <!-- CONTROL TAB -->
        <div class="tab-content" id="control">


            <div class="control-group">
                <h3>System Controls</h3>
                <div class="toggle-container">
                    <label class="toggle-label">
                        System Activation
                        <div class="toggle-switch">
                            <input type="checkbox" class="control-toggle" data-variable="belt" id="beltControl">
                            <span class="toggle-slider"></span>
                        </div>
                    </label>
                </div>

                <!-- toggle container for i0.0 -->
                <div class="toggle-container">
                    <label class="toggle-label">
                        i0.0
                        <div class="toggle-switch">
                            <input type="checkbox" class="control-toggle" data-variable="belt" id="beltControl">
                            <span class="toggle-slider"></span>
                        </div>
                    </label>
                </div>

                <!-- toggle container for i0.1 -->
                <div class="toggle-container">
                    <label class="toggle-label">
                        i0.1
                        <div class="toggle-switch">
                            <input type="checkbox" class="control-toggle" data-variable="belt" id="beltControl">
                            <span class="toggle-slider"></span>
                        </div>
                    </label>
                </div>


                <!-- toggle container for i0.2 -->
                <div class="toggle-container">
                    <label class="toggle-label">
                        i0.1
                        <div class="toggle-switch">
                            <input type="checkbox" class="control-toggle" data-variable="belt" id="beltControl">
                            <span class="toggle-slider"></span>
                        </div>
                    </label>
                </div>



                <!-- toggle container for m-area-safety -->
                <div class="toggle-container">
                    <label class="toggle-label">
                        m-area-safety
                        <div class="toggle-switch">
                            <input type="checkbox" class="control-toggle" data-variable="belt" id="beltControl">
                            <span class="toggle-slider"></span>
                        </div>
                    </label>
                </div>


            </div>


        </div>

        <!-- ALARMS TAB -->
        <div class="tab-content" id="alarms">
            <h2>Alarms & Errors</h2>
            <div class="alarms-container">
                <p id="alarmStatus" class="alarm-placeholder">Coming soon in a newer version...</p>
                <!-- TODO: Populate with TIA-Portal alarms from Node-RED -->
            </div>
        </div>

        <!-- SETTINGS TAB -->
        <div class="tab-content" id="settings">
            <h2>Settings</h2>
            <div class="settings-container">
                <p class="settings-placeholder">Coming soon in a newer version...</p>
            </div>
        </div>
    </div>

    <!-- Chart.js for live data graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>

    <!-- Modular Application Scripts -->
    <!-- Load modules in dependency order -->
    <script src="js/api.js"></script>
    <script src="js/liveData.js"></script>
    <script src="js/calendar.js"></script>
    <script src="js/controls.js"></script>
    <script src="js/ui.js"></script>
    <!-- Main application initialization -->
    <script src="js/app.js"></script>
</body>

</html>
