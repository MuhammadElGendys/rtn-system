<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PLC Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>PLC Dashboard</h1>

<div class="card">
Pressure: <span id="pressure">--</span>
</div>

<div class="card">
Temperature: <span id="temperature">--</span>
</div>

<div class="card">
Speed RPM: <span id="speedRPM">--</span>
</div>

<div class="card">
Motor: <span id="motorRun">--</span>
</div>

<div class="card">
Alarm: <span id="alarmActive">--</span>
</div>

<h2>History</h2>

<table>
<thead>
<tr>
<th>ID</th>
<th>Pressure</th>
<th>Temp</th>
<th>RPM</th>
<th>Motor</th>
<th>Alarm</th>
<th>Time</th>
</tr>
</thead>

<tbody id="historyTable">
</tbody>

<!-- CONTROLS -->
<button onclick="toggleMotor()">Toggle Motor</button>
<!-- CONTROLS -->


</table>

<!-- MACHINE DATA -->

<section class="machines">
    <div>
        <h3>Pressure</h3>
        <p id="pressure">--</p>
    </div>

    <div>
        <h3>Temperature</h3>
        <p id="temperature">--</p>
    </div>
    
    <div>
        <h3>Speed RPM</h3>
        <p id="speed">--</p>
    </div>
    
    <div>
        <h3>Motor</h3>
        <p id="motor">--</p>
    </div>
    
    <div>
        <h3>Alarm</h3>
        <p id="alarm">--</p>
    </div>
</section>
<!-- MACHINE DATA -->

<script src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


<!-- API CONNECTION -->
 <script>
async function loadData() {
    try {
        const res = await fetch("http://localhost:1880/api/latest");
        const data = await res.json();

        // CONNECT DATA TO HTML (UI)
        document.getElementById("pressure").textContent = data.pressure ?? "--";
        document.getElementById("temperature").textContent = data.temperature ?? "--";
        document.getElementById("speed").textContent = data.speedRPM ?? "--";

        document.getElementById("motor").textContent = data.motorRun ? "ON" : "OFF";
        document.getElementById("alarm").textContent = data.alarmActive ? "ACTIVE" : "NORMAL";

    } catch (err) {
        console.error(err);
    }
}

// UPDATE EVERY SECOND
setInterval(loadData, 1000);
loadData();
</script>
<!-- API CONNECTION -->


<!-- CONTROLS -->
<script>
async function toggleMotor() {
    await fetch("http://192.168.0.1:1880/api/control", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            motorRun: true
        })
    });
}
</script>
<!-- CONTROLS -->
 
</body>
</html>
